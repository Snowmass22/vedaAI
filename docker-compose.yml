version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: veda-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - veda-net

  redis:
    image: redis:7.0-alpine
    container_name: veda-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - veda-net

volumes:
  mongodb_data:
  redis_data:

networks:
  veda-net:
    driver: bridge
